# status.yaml — Übersicht aller aktiven Abenteuer
# Diese Datei wird vom Signal-Bot gelesen (ttrpg-signal).
# → Kopiere diese Datei als status.yaml und trage echte Werte ein.

abenteuer:
  - ordner: mein_abenteuer            # Ordnername unter adventures/
    name: "Mein Erstes Abenteuer"
    signal_gruppe: ""                 # Signal-Gruppen-ID der Spielgruppe (wird von !neu gesetzt)
    spieler:
      - name: MaxMustermann           # muss zu players/[name].yaml passen
        charakter: ""                 # wird nach Character Setup befüllt
        setup_status: invited         # invited | ready  (wird von !invite / CHARACTER_SETUP gesetzt)
        private_gruppe: ""            # Signal-Gruppen-ID des privaten Setup-Kanals (1:1 DM ↔ Spieler)
    status: setup                     # setup | session_0 | aktiv | pausiert
    letzte_szene: ""
    zuletzt_gespielt: ""
