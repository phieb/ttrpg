# Setting-Vorlage — wird in Session 0 ausgefüllt

name: ""
stimmung: ""  # düster / episch / humorvoll / mysteriös / gemischt

welt:
  typ: ""  # Fantasy / Steampunk / Horror / historisch / eigenes Setting
  beschreibung: ""  # 2-3 Sätze Weltbeschreibung
  besonderheiten: []  # Was macht diese Welt einzigartig?

magie:
  existiert: true
  wie_funktioniert_sie: ""

konflikt:
  hauptbedrohung: ""
  hintergrund: ""
  bekannte_fraktionen: []

startort:
  name: ""
  beschreibung: ""
  atmosphaere: ""

aktuelle_lage: ""

# ── Spezies ────────────────────────────────────────────────────────────────────
# Optional — überschreibt die Spezies-Liste der aktiven Flavours.
# Leer lassen um die Flavour-Defaults zu verwenden.
# Beispiel: ["Mensch", "Elf", "Vampir"]
verfuegbare_spezies: []

# ── Sprache ────────────────────────────────────────────────────────────────────
# Bestimmt welche Sprachversion der Engine-Prompts geladen wird.
# Wenn _engine/{language}/DUNGEON_MASTER.md existiert, wird sie bevorzugt.
# Fallback: _engine/DUNGEON_MASTER.md (Deutsch)
language: de   # de | en | fr | ...

# ── Flavours ───────────────────────────────────────────────────────────────────
# Schalten bestimmtes DM-Verhalten an oder aus.
# Nur setzen wenn die Gruppe das explizit möchte.
flavours:
  booktok: false    # true → Dark Romance Charakterbau + Atmosphäre
  fantasy: false    # true → Elf, Zwerg, Hexe, Halbblut als Spezies verfügbar
  mythical: false   # true → Vampir, Werwolf, Nymphe, Shapeshifter als Spezies verfügbar
  historical: false # true → Historisches Setting, nur Mensch, Stand/Herkunft statt Spezies
  # mature wird automatisch aktiviert wenn booktok aktiv ist
